name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'feature/**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      publish_docker:
        description: 'Publish Docker image to Docker Hub'
        required: true
        type: boolean
        default: false
      docker_tag:
        description: 'Docker image tag (e.g., latest, v1.0.0)'
        required: false
        type: string
        default: 'v0.0.1'

jobs:
  generate-consensus-fixtures:
    name: Generate Consensus Fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute consensus fixtures cache key
        id: consensus-fixtures-cache-key
        shell: bash
        run: |
          manifest="${RUNNER_TEMP}/consensus-fixtures-cache-key.txt"
          {
            echo "cache-version=v1"
            echo "runner-os=${RUNNER_OS}"
            echo "runner-arch=${RUNNER_ARCH}"
            echo "python=3.12"
            echo "layer=consensus"
            echo "fork=Lstar"
            echo "scheme=test"
            echo "output=tools/leanSpec/fixtures/consensus"
            echo "fill-command=uv run fill --fork=Lstar --clean -n auto"
            echo "leanspec-commit=$(git -C tools/leanSpec rev-parse HEAD)"
            git -C tools/leanSpec ls-files -z \
              pyproject.toml \
              uv.lock \
              src \
              tests \
              packages/testing/pyproject.toml \
              packages/testing/src \
              | while IFS= read -r -d '' path; do
                  echo "leanspec-file $(git -C tools/leanSpec hash-object "$path") $path"
                done
            for path in CMakeLists.txt scripts/bootstrap.sh .github/workflows/ci.yml; do
              echo "lantern-file $(git hash-object "$path") $path"
            done
          } > "$manifest"
          key_hash="$(sha256sum "$manifest" | awk '{print $1}')"
          echo "key=lantern-consensus-fixtures-v1-${key_hash}" >> "$GITHUB_OUTPUT"

      - name: Restore consensus fixtures cache
        id: consensus-fixtures-cache
        uses: actions/cache@v4
        with:
          path: tools/leanSpec/fixtures/consensus
          key: ${{ steps.consensus-fixtures-cache-key.outputs.key }}

      - name: Install uv
        if: steps.consensus-fixtures-cache.outputs.cache-hit != 'true'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Rust toolchain
        if: steps.consensus-fixtures-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap submodules
        if: steps.consensus-fixtures-cache.outputs.cache-hit != 'true'
        run: ./scripts/bootstrap.sh

      - name: Generate consensus fixtures
        if: steps.consensus-fixtures-cache.outputs.cache-hit != 'true'
        run: ./scripts/bootstrap.sh --fixtures

      - name: Upload consensus fixtures artifact
        uses: actions/upload-artifact@v4
        with:
          name: lantern-consensus-fixtures
          path: tools/leanSpec/fixtures/consensus/
          if-no-files-found: error

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs:
      - generate-consensus-fixtures
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Bootstrap submodules
        run: ./scripts/bootstrap.sh

      - name: Download consensus fixtures
        uses: actions/download-artifact@v4
        with:
          name: lantern-consensus-fixtures
          path: tools/leanSpec/fixtures/consensus/

      - name: Configure (CMake)
        run: cmake -S . -B build -GNinja -DLANTERN_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure -V

  publish-docker-amd64:
    name: Publish Docker Image (amd64)
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_docker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lantern:${{ github.event.inputs.docker_tag }}-amd64
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            LANTERN_FORCE_REBUILD=1
          no-cache: true

  publish-docker-arm64:
    name: Publish Docker Image (arm64)
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_docker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lantern:${{ github.event.inputs.docker_tag }}-arm64
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            LANTERN_FORCE_REBUILD=1
          no-cache: true

  publish-docker-manifest:
    name: Publish Docker Manifest
    runs-on: ubuntu-24.04
    needs:
      - publish-docker-amd64
      - publish-docker-arm64
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_docker == 'true'
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest list
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/lantern:${{ github.event.inputs.docker_tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/lantern:${{ github.event.inputs.docker_tag }}-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/lantern:${{ github.event.inputs.docker_tag }}-arm64

      - name: Inspect manifest list
        run: |
          docker buildx imagetools inspect \
            ${{ secrets.DOCKERHUB_USERNAME }}/lantern:${{ github.event.inputs.docker_tag }}
